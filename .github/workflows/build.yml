name: Build

on:
  push:
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

env:
  SOLUTION_FILE: msstyleEditorSharp.sln
  BUILD_CONFIGURATION: Release
  BUILD_PLATFORM: Any CPU
  APP_OUTPUT_DIR: msstyleEditorSharp/bin/Release

jobs:
  build:
    runs-on: windows-2022

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup NuGet
        uses: NuGet/setup-nuget@v2

      - name: Setup MSBuild
        uses: microsoft/setup-msbuild@v2
        with:
          vs-version: '[17.0,18.0)'

      - name: Restore NuGet packages
        shell: pwsh
        run: nuget restore $env:SOLUTION_FILE

      - name: Build solution
        shell: pwsh
        run: >-
          msbuild $env:SOLUTION_FILE
          /m
          /t:Build
          /p:Configuration="$env:BUILD_CONFIGURATION"
          /p:Platform="$env:BUILD_PLATFORM"

      - name: Stage build artifact
        id: stage_artifact
        shell: pwsh
        run: |
          $artifactRoot = Join-Path $env:RUNNER_TEMP 'msstyleEditor-artifact'
          $outputRoot = Join-Path $env:GITHUB_WORKSPACE $env:APP_OUTPUT_DIR

          if (Test-Path $artifactRoot) {
            Remove-Item $artifactRoot -Recurse -Force
          }

          New-Item -ItemType Directory -Path $artifactRoot | Out-Null
          Copy-Item (Join-Path $outputRoot '*') $artifactRoot -Recurse -Force
          Copy-Item (Join-Path $env:GITHUB_WORKSPACE 'LICENSE') $artifactRoot -Force
          Copy-Item (Join-Path $env:GITHUB_WORKSPACE 'README.md') $artifactRoot -Force

          "artifact_path=$artifactRoot" | Out-File -FilePath $env:GITHUB_OUTPUT -Encoding utf8 -Append

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: msstyleEditor-net48-windows
          path: ${{ steps.stage_artifact.outputs.artifact_path }}
          if-no-files-found: error
          retention-days: 14